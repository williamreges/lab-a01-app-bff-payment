server:
  port: 8100

name:
  service:
    repository: app-repository-payment

sts:
  url: http://localhost:7777
  client:
    id: 91fa46ac-dfd5-41cc-b3a6-5ed186421df1
    secret: c1be44b0-3119-4a5b-9f54-cc6a2fd06e0e

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
      base-path: "/"
      path-mapping:
        prometheus: "metrics"
  metrics:
    tags:
      application:  service-app-bff-payment

  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

logging:
  pattern:
    correlation: "[${spring.application.name:},%X{traceId:-},%X{spanId:-},%X{correlationID:-}] "
  include-application-name: false

eureka:
  client:
    enabled: true
    service-url:
      defaultZone: http://localhost:8761/eureka

spring:
  application:
    name: app-bff-payment
  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 5000
            readTimeout: 5000
            loggerLevel: full
      autoconfiguration:
        jackson:
          enabled: true
      circuitbreaker:
        enabled: true
        alphanumeric-ids:
          enabled: true
    config:
      enabled: false


  jackson:
    default-property-inclusion: NON_NULL
    serialization:
      FAIL_ON_EMPTY_BEANS: false